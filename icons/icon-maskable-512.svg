<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full bleed background for maskable -->
  <rect width="512" height="512" fill="#62325e"/>
  <g transform="translate(128, 108)">
    <!-- Film strip left perforation -->
    <rect x="8" y="40" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="8" y="72" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="8" y="104" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="8" y="136" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="8" y="168" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="8" y="200" width="20" height="16" rx="3" fill="#401628"/>
    <!-- Film strip right perforation -->
    <rect x="228" y="40" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="228" y="72" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="228" y="104" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="228" y="136" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="228" y="168" width="20" height="16" rx="3" fill="#401628"/>
    <rect x="228" y="200" width="20" height="16" rx="3" fill="#401628"/>
    <!-- Film strip body -->
    <rect x="0" y="30" width="256" height="200" rx="10" fill="none" stroke="#FAFAFA" stroke-width="6"/>
    <!-- Screen / poster area -->
    <rect x="38" y="48" width="180" height="124" rx="6" fill="#1E1E1E"/>
    <!-- Play button -->
    <polygon points="106,88 106,132 140,110" fill="#F5C518"/>
    <!-- Title bar -->
    <rect x="38" y="186" width="120" height="10" rx="5" fill="#F5C518"/>
    <rect x="38" y="204" width="76" height="7" rx="3" fill="#401628"/>
  </g>
</svg>
