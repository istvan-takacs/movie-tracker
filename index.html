<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#62325e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Movies">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <title>Movie Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<header>
    <h1>Movie Tracker</h1>
    <div class="auth-bar">
        <button id="btn-google-signin" class="google-signin-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" class="google-icon">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </button>
        <div id="user-info" class="user-info hidden">
            <span id="user-name" class="user-name"></span>
            <button id="btn-signout" class="btn-signout">Sign out</button>
        </div>
    </div>
</header>

<main>
    <!-- View 1: Discover -->
    <section id="view-discover" class="view active">
        <!-- Search bar -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for a movie…" autocomplete="off">
            <button id="search-clear" class="search-clear hidden" aria-label="Clear search">✕</button>
        </div>

        <!-- Source filter tabs -->
        <div class="filter-tabs-row">
            <button class="filter-tab active" data-source="all">All</button>
            <button class="filter-tab" data-source="theatrical">Theatrical</button>
            <button class="filter-tab" data-source="streaming">Streaming</button>
        </div>

        <!-- Sort dropdown -->
        <div class="sort-row">
            <label for="sort-select" class="sort-label">Sort:</label>
            <select id="sort-select" class="sort-select">
                <option value="relevance">Relevance</option>
                <option value="release-date">Release Date</option>
                <option value="rating">Rating</option>
                <option value="popularity">Popularity</option>
            </select>
        </div>

        <!-- Notification prompt -->
        <button id="btn-notifications" class="notification-prompt">
            🔔 Enable release notifications
        </button>

        <p id="discover-counter" class="discover-counter hidden"></p>

        <!-- Search results list (shown in search mode) -->
        <div id="search-results" class="search-results hidden"></div>

        <!-- Card stack (shown in discover mode) -->
        <div id="card-stack"></div>
        <div class="swipe-buttons">
            <button id="btn-dismiss" aria-label="Dismiss">✕</button>
            <button id="btn-interested" aria-label="Add to watchlist">✓</button>
        </div>
        <p class="swipe-hint">Swipe or use ← → keys</p>
    </section>

    <!-- View 2: Watchlist -->
    <section id="view-watchlist" class="view">
        <h2 class="view-title">Watchlist</h2>
        <div class="search-bar list-search-bar">
            <input type="text" id="watchlist-search" class="list-search-input" placeholder="Search watchlist…" autocomplete="off">
            <button id="watchlist-search-clear" class="search-clear hidden" aria-label="Clear search">✕</button>
        </div>
        <div id="watchlist-container"></div>
    </section>

    <!-- View 3: Seen -->
    <section id="view-seen" class="view">
        <h2 class="view-title">Seen</h2>
        <div class="search-bar list-search-bar">
            <input type="text" id="seen-search" class="list-search-input" placeholder="Search seen…" autocomplete="off">
            <button id="seen-search-clear" class="search-clear hidden" aria-label="Clear search">✕</button>
        </div>
        <div id="seen-container"></div>
    </section>

    <!-- View 4: Dismissed -->
    <section id="view-dismissed" class="view">
        <h2 class="view-title">Dismissed</h2>
        <div class="search-bar list-search-bar">
            <input type="text" id="dismissed-search" class="list-search-input" placeholder="Search dismissed…" autocomplete="off">
            <button id="dismissed-search-clear" class="search-clear hidden" aria-label="Clear search">✕</button>
        </div>
        <div id="dismissed-container"></div>
    </section>
</main>

<!-- Movie detail overlay -->
<div id="movie-detail" class="detail-overlay hidden">
    <div class="detail-scroll">
        <button class="detail-back" id="detail-back">← Back</button>
        <div id="detail-content"></div>
    </div>
</div>

<!-- Rating modal -->
<div id="rating-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 class="modal-title">Mark as Seen</h3>
        <p class="modal-movie-title" id="rating-modal-title"></p>
        <p class="modal-label">Your Rating</p>
        <div class="rating-buttons" id="rating-buttons"></div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="rating-cancel">Cancel</button>
            <button class="modal-btn modal-btn-save" id="rating-save">Save</button>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<nav class="bottom-tabs">
    <button data-view="discover" class="active">Discover</button>
    <button data-view="watchlist">
        Watchlist
        <span id="badge-watchlist" class="tab-badge hidden">0</span>
    </button>
    <button data-view="seen">
        Seen
        <span id="badge-seen" class="tab-badge hidden">0</span>
    </button>
    <button data-view="dismissed">
        Dismissed
        <span id="badge-dismissed" class="tab-badge hidden">0</span>
    </button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
